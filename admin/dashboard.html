<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Dashboard - Seth Steels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Microsoft Clarity Tracking -->
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "vmjrv6mmfp");
    </script>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col flex-shrink-0">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-xl font-bold">Seth Steels CMS</h1>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('products')" id="nav-products"
                class="w-full text-left px-4 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 transition-colors flex items-center">
                <i class="fas fa-box-open w-6 text-center mr-3"></i> Products
            </button>
            <button onclick="switchTab('articles')" id="nav-articles"
                class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-800 transition-colors flex items-center">
                <i class="fas fa-newspaper w-6 text-center mr-3"></i> Articles
            </button>
            <button onclick="switchTab('testimonials')" id="nav-testimonials"
                class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-800 transition-colors flex items-center">
                <i class="fas fa-quote-right w-6 text-center mr-3"></i> Testimonials
            </button>
        </nav>

        <div class="p-4 border-t border-gray-800">
            <button id="logout-btn"
                class="w-full px-4 py-2 border border-gray-600 rounded-lg text-gray-300 hover:text-white hover:border-gray-400 transition-colors">
                <i class="fas fa-sign-out-alt mr-2"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto bg-gray-50 p-8">
        <!-- Products View -->
        <div id="view-products" class="tab-view block">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Manage Products</h2>
                <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i> Add Product
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Image</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Name</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Category</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="products-table-body">
                        <!-- Dynamic Content -->
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" colspan="4">Loading
                                products...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Articles View -->
        <div id="view-articles" class="tab-view hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Manage Articles</h2>
                <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i> Write Article
                </button>
            </div>
            <p class="text-gray-500">Article management interface coming soon...</p>
        </div>

        <!-- Testimonials View -->
        <div id="view-testimonials" class="tab-view hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Manage Testimonials</h2>
                <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i> Add Testimonial
                </button>
            </div>
            <p class="text-gray-500">Testimonial management interface coming soon...</p>
        </div>
    </main>

    <script src="../js/supabase-config.js"></script>
    <script>
        // Check Auth
        async function checkAuth() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            }
        }
        checkAuth();

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await window.supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        });

        // Tabs
        function switchTab(tabName) {
            // Hide all views
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('block'));

            // Show selected
            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`view-${tabName}`).classList.add('block');

            // Reset Nav Styles
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('bg-blue-600');
                el.classList.add('hover:bg-gray-800');
            });
            // highlight selected
            const activeBtn = document.getElementById(`nav-${tabName}`);
            activeBtn.classList.add('bg-blue-600');
            activeBtn.classList.remove('hover:bg-gray-800');
        }
    </script>
</body>

</html>
